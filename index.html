<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meine GitHub Pages Testseite</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      max-width: 500px;
    }

    h1 {
      margin-bottom: 10px;
      color: #38bdf8;
    }

    p {
      line-height: 1.5;
      color: #cbd5e1;
    }

    a {
      color: #38bdf8;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 15px;
      background: #38bdf8;
      color: #0f172a;
      border-radius: 8px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🚀 GitHub Pages Test</h1>
    <p>
      Wenn du das siehst, funktioniert deine GitHub Pages Seite!
    </p>

    <p>
      Du kannst hier später dein Portfolio, Projekte oder Blog einbauen.
    </p>

    <a class="btn" href="https://github.com" target="_blank">
      Zu GitHub
    </a>
  </div>
</body>
</html>
