<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aurora Systems</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #0b1220, #05070d);
      color: #e5e7eb;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      max-width: 700px;
      padding: 40px;
    }

    .logo {
      font-size: 14px;
      letter-spacing: 6px;
      color: #94a3b8;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 52px;
      font-weight: 600;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 15px;
    }

    p {
      color: #94a3b8;
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 12px 20px;
      border: 1px solid #334155;
      border-radius: 10px;
      color: #e5e7eb;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #111827;
      border-color: #475569;
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #475569;
      letter-spacing: 2px;
    }

    .glow {
      position: absolute;
      width: 500px;
      height: 500px;
      background: #3b82f6;
      filter: blur(140px);
      opacity: 0.15;
      top: -100px;
      left: -100px;
    }
  </style>
</head>

<body>
  <div class="glow"></div>

  <div class="container">
    <div class="logo">AURORA SYSTEMS</div>

    <h1>Building Tomorrow</h1>

    <p>
      We design scalable infrastructures for undefined problems in emerging digital environments.
    </p>

    <a class="btn" href="#">Request Access</a>

    <div class="footer">
      © 2026 • All systems nominal
    </div>
  </div>
</body>
</html>
